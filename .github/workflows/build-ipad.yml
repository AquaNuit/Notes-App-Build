# Build Unsigned IPA for AltStore
# ==================================
# This workflow builds an unsigned .ipa that you can install on your
# iPad via AltStore — no Apple Developer Program ($99/year) needed.
#
# How it works:
#   1. Builds the app on GitHub's macOS runner
#   2. Strips all code signing (AltStore handles that on-device)
#   3. Packages into a standard .ipa (Payload/InscribeApp.app → zip)
#   4. Uploads as a downloadable artifact
#
# Installation:
#   1. Download the .ipa from GitHub Actions → Artifacts
#   2. Send it to your iPad (AirDrop, iCloud, etc.)
#   3. Open AltStore → My Apps → + → select the .ipa
#   4. AltStore signs and installs it using your free Apple ID
#
# No certificates, no provisioning profiles, no secrets required.
#
# Trigger: Manual only (workflow_dispatch) to prevent collision
#          with the CI workflow on code push.

name: 🏗️ Build Unsigned IPA (AltStore)

on:
  workflow_dispatch:    # Manual trigger only — no push collision

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build and Package
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      # 1. Checkout
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Select the latest available Xcode
      - name: Select Newest Xcode
        run: |
          XCODE_PATH=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -n 1)
          echo "Using Xcode at: $XCODE_PATH"
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"
          xcodebuild -version

      # 3. Resolve SPM dependencies
      - name: Resolve Package Dependencies
        run: swift package resolve

      # 4. Archive the app (unsigned — AltStore handles signing on-device)
      #    Bypasses Swift 6 strict concurrency via SWIFT_STRICT_CONCURRENCY=minimal.
      #    This relaxes Sendable/@MainActor warnings without changing language mode.
      - name: Archive App (Bypassing Swift 6 Concurrency)
        run: |
          set -o pipefail
          xcodebuild archive \
            -scheme Inscribe \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath unsigned.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ENTITLEMENTS_REQUIRED=NO \
            SWIFT_STRICT_CONCURRENCY=minimal \
            2>&1 | tee xcodebuild_archive.log

      # 5. Package the .app into an unsigned .ipa
      - name: Package IPA
        run: |
          mkdir -p Payload
          APP_PATH=$(find unsigned.xcarchive -name '*.app' -type d | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "❌ Error: Compiled .app bundle not found in archive."
            echo "Archive contents:"
            find unsigned.xcarchive -maxdepth 3 -type d 2>/dev/null || echo "(archive directory missing)"
            exit 1
          fi
          echo "Found app at: $APP_PATH"
          cp -R "$APP_PATH" Payload/
          zip -r Inscribe.ipa Payload/
          rm -rf Payload
          echo "=== IPA contents ==="
          unzip -l Inscribe.ipa | head -20

      # 6. Upload the IPA as a downloadable artifact
      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Inscribe-Unsigned
          path: Inscribe.ipa
          compression-level: 0   # IPA is already compressed
