name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build and Test
    runs-on: macos-15
    timeout-minutes: 30

    steps:
    - uses: actions/checkout@v4

    - name: Select Xcode
      run: |
        LATEST=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
        if [ -n "$LATEST" ]; then
          sudo xcode-select -s "$LATEST/Contents/Developer"
          echo "Selected Xcode: $(basename $LATEST)"
        fi
        xcodebuild -version

    - name: List available simulators
      run: xcrun simctl list devices available

    - name: Build (Release)
      run: |
        DEVICE_ID=$(xcrun simctl list devices available 2>/dev/null | \
          grep -E 'iPad|iPhone' | grep -v 'unavailable' | \
          grep -oE '[0-9A-F-]{36}' | head -1)
        if [ -z "$DEVICE_ID" ]; then
          echo "No iOS Simulator available — building for generic iOS instead"
          xcodebuild build \
            -scheme Inscribe \
            -destination 'generic/platform=iOS' \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO
        else
          echo "Building for simulator: $(xcrun simctl list devices available 2>/dev/null | grep "$DEVICE_ID")"
          xcodebuild build \
            -scheme Inscribe \
            -destination "platform=iOS Simulator,id=$DEVICE_ID" \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO
        fi

    - name: Run Unit Tests
      run: |
        DEVICE_ID=$(xcrun simctl list devices available 2>/dev/null | \
          grep -E 'iPad|iPhone' | grep -v 'unavailable' | \
          grep -oE '[0-9A-F-]{36}' | head -1)
        if [ -z "$DEVICE_ID" ]; then
          echo "No iOS Simulator available — skipping unit tests"
          exit 0
        fi
        echo "Running tests on: $(xcrun simctl list devices available 2>/dev/null | grep "$DEVICE_ID")"
        xcodebuild test \
          -scheme Inscribe \
          -destination "platform=iOS Simulator,id=$DEVICE_ID" \
          -configuration Debug \
          -only-testing:InscribeCoreTests \
          -only-testing:InscribeStorageTests \
          CODE_SIGNING_ALLOWED=NO

    - name: SwiftLint
      continue-on-error: true
      run: |
        if command -v swiftlint &> /dev/null; then
          swiftlint lint --strict
        else
          echo "SwiftLint not installed. Install with: brew install swiftlint"
        fi

    - name: Upload test artifacts
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: test-output
        path: ~/Library/Developer/Xcode/DerivedData/**/Logs/Test/
